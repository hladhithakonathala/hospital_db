<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | GVP Care</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-container">
    <a href="{{ url_for(session['user_role'] + '_dashboard') }}" class="back-link">← Back to Dashboard</a>
    <div class="login-box">
      <div class="login-header">
        <span class="role-icon">🔒</span>
        <h2>Change Password</h2>
        <p style="color:#777; font-size:.9rem; margin-top:6px;">Keep your account secure</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <label class="input-label">Current Password</label>
        <div class="password-wrap">
          <input type="password" name="current_password"
                 id="current_password"
                 placeholder="Enter current password" required>
          <span class="eye-icon" onclick="togglePassword('current_password')">👁️</span>
        </div>

        <label class="input-label">New Password</label>
        <div class="password-wrap">
          <input type="password" name="new_password"
                 id="new_password"
                 placeholder="Enter new password (min 6 chars)" required>
          <span class="eye-icon" onclick="togglePassword('new_password')">👁️</span>
        </div>

        <label class="input-label">Confirm New Password</label>
        <div class="password-wrap">
          <input type="password" name="confirm_password"
                 id="confirm_password"
                 placeholder="Confirm new password" required>
          <span class="eye-icon" onclick="togglePassword('confirm_password')">👁️</span>
        </div>

        <!-- Password Strength -->
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <p class="strength-text" id="strengthText"></p>

        <button type="submit">🔒 Change Password</button>
      </form>
    </div>
  </div>

  <script>
    // Toggle password visibility
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Password strength checker
    document.getElementById('new_password').addEventListener('input', function() {
      const val      = this.value;
      const fill     = document.getElementById('strengthFill');
      const text     = document.getElementById('strengthText');
      let strength   = 0;

      if (val.length >= 6)  strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const colors = ['#e63946', '#ff6b6b', '#b06000', '#2d7a4f', '#1a5c38'];
      const labels = ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];

      fill.style.width = (strength * 20) + '%';
      fill.style.background = colors[strength - 1] || '#eee';
      text.textContent = val.length > 0 ? labels[strength - 1] || '' : '';
      text.style.color = colors[strength - 1] || '#777';
    });
  </script>
</body>
</html>
